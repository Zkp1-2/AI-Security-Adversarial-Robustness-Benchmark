seed: 42
device: "cuda"

data:
  dataset: "cifar10"
  data_dir: "./data"
  num_workers: 2
  batch_size: 128

model:
  name: "resnet18"
  num_classes: 10

train:
  epochs: 10
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  save_dir: "./results"
  ckpt_clean: "./results/resnet18_cifar10_clean.pth"
  ckpt_adv: "./results/resnet18_cifar10_adv_fgsm.pth"
  ckpt_pgd: "./results/resnet18_cifar10_adv_pgd.pth"
  ckpt_trades: "./results/resnet18_cifar10_trades.pth"

attack:
  eps: 0.031372549
  alpha: 0.007843137
  pgd_steps: 10
  eps_list:
    - 0.007843137
    - 0.015686275
    - 0.031372549
    - 0.062745098

defense:
  pgd_train_steps: 7
  trades_steps: 7
  trades_beta: 6.0